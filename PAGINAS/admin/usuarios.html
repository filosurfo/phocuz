<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHO CUZ — Usuarios</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --dorado: #C49A3C; --dorado-claro: #D4B896; --bg: #0a0300; --surface: #130601; --border: rgba(196,154,60,0.2); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: #d4c4a0; display: flex; }
    .sidebar { width: 240px; min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 2rem 0; position: fixed; top: 0; left: 0; bottom: 0; }
    .sidebar-brand { text-align: center; padding: 0 1.5rem 2rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .sidebar-brand .logo { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; letter-spacing: 4px; }
    .sidebar-brand .logo .pho { color: var(--dorado); } .sidebar-brand .logo .cuz { color: #f5f0e8; }
    .sidebar-brand .sub { font-size: 9px; letter-spacing: 4px; color: rgba(196,154,60,0.4); text-transform: uppercase; margin-top: 4px; }
    .nav-section { padding: 0 1rem; margin-bottom: 0.5rem; }
    .nav-label { font-size: 9px; letter-spacing: 3px; color: rgba(196,154,60,0.35); text-transform: uppercase; padding: 0 0.5rem; margin-bottom: 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.65rem 0.8rem; border-radius: 3px; color: rgba(212,180,130,0.7); text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; transition: all 0.15s; }
    .nav-item:hover, .nav-item.active { background: rgba(196,154,60,0.08); color: var(--dorado); }
    .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-footer { margin-top: auto; padding: 1rem; border-top: 1px solid var(--border); }
    .user-info { font-size: 0.8rem; color: rgba(196,154,60,0.5); letter-spacing: 1px; margin-bottom: 0.5rem; padding: 0 0.5rem; word-break: break-all; }
    .btn-logout { display: block; width: 100%; padding: 0.5rem; background: transparent; border: 1px solid rgba(196,154,60,0.2); border-radius: 2px; color: rgba(196,154,60,0.5); font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: var(--dorado); color: var(--dorado); }
    .main { margin-left: 240px; flex: 1; padding: 2.5rem; }
    .page-title { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--dorado); letter-spacing: 3px; margin-bottom: 0.3rem; }
    .page-sub { font-size: 0.85rem; color: rgba(196,154,60,0.45); letter-spacing: 2px; margin-bottom: 2rem; }
    .toolbar { margin-bottom: 1.5rem; }
    .btn-primary { padding: 0.6rem 1.5rem; background: var(--dorado); color: #0a0300; border: none; border-radius: 2px; font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 0.8rem 1rem; font-size: 10px; letter-spacing: 3px; color: rgba(196,154,60,0.5); text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); background: rgba(196,154,60,0.03); }
    td { padding: 0.9rem 1rem; font-size: 0.9rem; border-bottom: 1px solid rgba(196,154,60,0.06); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .role-chip { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; letter-spacing: 2px; }
    .role-global { background: rgba(196,154,60,0.15); border: 1px solid rgba(196,154,60,0.3); color: var(--dorado); }
    .role-admin { background: rgba(100,150,200,0.15); border: 1px solid rgba(100,150,200,0.3); color: #90b4d4; }
    .btn-edit { padding: 0.3rem 0.8rem; background: transparent; border: 1px solid rgba(196,154,60,0.3); border-radius: 2px; color: var(--dorado); font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: all 0.15s; margin-right: 0.3rem; }
    .btn-delete { padding: 0.3rem 0.8rem; background: transparent; border: 1px solid rgba(160,60,60,0.3); border-radius: 2px; color: #c07070; font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; }
    .btn-edit:hover { background: rgba(196,154,60,0.08); }
    .btn-delete:hover { background: rgba(160,60,60,0.08); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: rgba(196,154,60,0.3); font-size: 0.9rem; letter-spacing: 2px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #120601; border: 1px solid rgba(196,154,60,0.25); border-radius: 4px; padding: 2rem; width: 100%; max-width: 440px; }
    .modal-title { font-family: 'Cinzel', serif; color: var(--dorado); letter-spacing: 3px; margin-bottom: 1.5rem; font-size: 1rem; }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: 10px; letter-spacing: 3px; color: rgba(196,154,60,0.6); text-transform: uppercase; margin-bottom: 0.4rem; }
    .form-group input, .form-group select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(196,154,60,0.2); border-radius: 2px; padding: 0.65rem 0.8rem; color: #f5f0e8; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--dorado); }
    .form-group select option { background: #120601; }
    .info-note { font-size: 0.8rem; color: rgba(196,154,60,0.4); letter-spacing: 1px; margin-top: 0.3rem; line-height: 1.4; }
    .modal-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; justify-content: flex-end; }
    .btn-cancel { padding: 0.6rem 1.2rem; background: transparent; border: 1px solid var(--border); border-radius: 2px; color: rgba(196,154,60,0.5); font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; }
    .btn-cancel:hover { border-color: var(--dorado); color: var(--dorado); }
    .error-msg { display: none; margin-top: 0.8rem; padding: 0.5rem 0.8rem; background: rgba(180,30,30,0.15); border: 1px solid rgba(180,30,30,0.3); border-radius: 2px; color: #e07070; font-size: 0.82rem; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo"><span class="pho">PHO</span><span class="cuz"> CUZ</span></div>
      <div class="sub">Admin Panel</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">General</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">◆</span> Dashboard</a>
      <a href="menu-editor.html" class="nav-item"><span class="icon">◎</span> Editor de Menú</a>
      <a href="social-posts.html" class="nav-item"><span class="icon">◈</span> Posts para Redes</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Administración</div>
      <a href="usuarios.html" class="nav-item active"><span class="icon">◇</span> Usuarios</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-info" id="userEmail">—</div>
      <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-title">Gestión de Usuarios</div>
    <div class="page-sub">Administra los accesos al panel de PHO CUZ</div>
    <div class="toolbar">
      <button class="btn-primary" id="btnNuevo">+ Nuevo administrador</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="4" class="empty-state">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Nuevo Administrador</div>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="fName" placeholder="Nombre completo">
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="fEmail" placeholder="correo@ejemplo.com">
      </div>
      <div class="form-group" id="passwordGroup">
        <label>Contraseña temporal</label>
        <input type="password" id="fPassword" placeholder="Mínimo 6 caracteres">
        <p class="info-note">El usuario puede cambiarla después desde Firebase.</p>
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select id="fRole">
          <option value="restaurant_admin">Restaurant Admin — gestión de menú e imágenes</option>
          <option value="global_admin">Global Admin — acceso completo</option>
        </select>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelar">Cancelar</button>
        <button class="btn-primary" id="btnGuardar">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6Yh15hdO_PWoPanPcuCwzV8PDnslLqoE",
      authDomain: "phocuz.firebaseapp.com",
      projectId: "phocuz",
      storageBucket: "phocuz.firebasestorage.app",
      messagingSenderId: "241068135242",
      appId: "1:241068135242:web:93341c5ee0bcbcb5a3e7b3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUserId = null;
    let currentUserUid = null;
    let allUsers = [];

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = "login.html"; return; }
      const adminDoc = await getDoc(doc(db, "admins", user.uid));
      if (!adminDoc.exists() || adminDoc.data().role !== "global_admin") {
        window.location.href = "dashboard.html";
        return;
      }
      document.getElementById("userEmail").textContent = user.email;
      loadUsers();
    });

    async function loadUsers() {
      const snap = await getDocs(collection(db, "admins"));
      allUsers = [];
      snap.forEach(d => allUsers.push({ uid: d.id, ...d.data() }));
      renderTable(allUsers);
    }

    function renderTable(users) {
      const tbody = document.getElementById("usersTableBody");
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No hay usuarios registrados.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td style="font-weight:600;color:#f5f0e8;">${u.name || '—'}</td>
          <td>${u.email}</td>
          <td><span class="role-chip ${u.role === 'global_admin' ? 'role-global' : 'role-admin'}">${u.role === 'global_admin' ? 'Global Admin' : 'Restaurant Admin'}</span></td>
          <td>
            <button class="btn-edit" onclick="editUser('${u.uid}')">Editar</button>
            <button class="btn-delete" onclick="deleteUser('${u.uid}')">Eliminar</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal(title) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalOverlay").classList.add("open");
    }
    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("open");
      currentUserUid = null;
      document.getElementById("fName").value = "";
      document.getElementById("fEmail").value = "";
      document.getElementById("fPassword").value = "";
      document.getElementById("fRole").value = "restaurant_admin";
      document.getElementById("errorMsg").style.display = "none";
      document.getElementById("passwordGroup").style.display = "block";
      document.getElementById("fEmail").disabled = false;
    }

    document.getElementById("btnNuevo").addEventListener("click", () => openModal("Nuevo Administrador"));
    document.getElementById("btnCancelar").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target === e.currentTarget) closeModal(); });

    window.editUser = (uid) => {
      const u = allUsers.find(x => x.uid === uid);
      if (!u) return;
      currentUserUid = uid;
      document.getElementById("fName").value = u.name || "";
      document.getElementById("fEmail").value = u.email || "";
      document.getElementById("fRole").value = u.role || "restaurant_admin";
      document.getElementById("passwordGroup").style.display = "none";
      document.getElementById("fEmail").disabled = true;
      openModal("Editar Administrador");
    };

    window.deleteUser = async (uid) => {
      if (!confirm("¿Eliminar acceso de este usuario?")) return;
      await deleteDoc(doc(db, "admins", uid));
      loadUsers();
    };

    document.getElementById("btnGuardar").addEventListener("click", async () => {
      const errEl = document.getElementById("errorMsg");
      errEl.style.display = "none";
      const name = document.getElementById("fName").value.trim();
      const email = document.getElementById("fEmail").value.trim();
      const password = document.getElementById("fPassword").value;
      const role = document.getElementById("fRole").value;

      if (!name || !email) { errEl.textContent = "Nombre y correo son obligatorios."; errEl.style.display = "block"; return; }

      try {
        if (currentUserUid) {
          // Solo actualizar nombre y rol en Firestore
          await updateDoc(doc(db, "admins", currentUserUid), { name, role, updatedAt: new Date() });
        } else {
          if (!password || password.length < 6) { errEl.textContent = "La contraseña debe tener al menos 6 caracteres."; errEl.style.display = "block"; return; }
          // Crear usuario en Auth
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          // Guardar en Firestore
          await setDoc(doc(db, "admins", cred.user.uid), { name, email, role, createdAt: new Date() });
        }
        closeModal();
        loadUsers();
      } catch (err) {
        let msg = err.message;
        if (err.code === "auth/email-already-in-use") msg = "Este correo ya está registrado.";
        if (err.code === "auth/invalid-email") msg = "Correo inválido.";
        errEl.textContent = msg;
        errEl.style.display = "block";
      }
    });

    document.getElementById("btnLogout").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
