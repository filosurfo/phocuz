<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHO CUZ — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dorado: #C49A3C;
      --dorado-claro: #D4B896;
      --borgona-dark: #1a0505;
      --crema: #1e0f04;
      --cafe-oscuro: #0d0501;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #2e0f02 0%, #100401 50%, #060100 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
    }

    .login-box {
      background: rgba(10,3,1,0.85);
      border: 1px solid rgba(196,154,60,0.25);
      border-radius: 4px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 60px rgba(196,154,60,0.06);
    }

    .brand {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem;
      letter-spacing: 5px;
      margin-bottom: 0.3rem;
    }
    .brand .pho { color: var(--dorado); }
    .brand .cuz { color: #f5f0e8; }

    .brand-sub {
      font-size: 10px;
      letter-spacing: 6px;
      color: rgba(196,154,60,0.6);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .sep {
      display: block;
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--dorado), transparent);
      margin: 0.8rem auto 2rem;
    }

    .panel-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(196,154,60,0.5);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--dorado-claro);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(196,154,60,0.2);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      color: #f5f0e8;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 1px;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--dorado);
      background: rgba(196,154,60,0.04);
    }

    .btn-login {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.9rem;
      background: transparent;
      border: 1px solid var(--dorado);
      color: var(--dorado);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: var(--dorado);
      color: var(--cafe-oscuro);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      background: rgba(180,30,30,0.15);
      border: 1px solid rgba(180,30,30,0.3);
      border-radius: 2px;
      color: #e07070;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .back-link {
      display: block;
      margin-top: 2rem;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(196,154,60,0.4);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--dorado); }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="brand"><span class="pho">PHO</span><span class="cuz"> CUZ</span></div>
    <div class="brand-sub">Noodle Soup</div>
    <span class="sep"></span>
    <div class="panel-label">Panel de Administración</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="admin@phocuz.mx" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <a href="../../index.html" class="back-link">← Volver al sitio</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6Yh15hdO_PWoPanPcuCwzV8PDnslLqoE",
      authDomain: "phocuz.firebaseapp.com",
      projectId: "phocuz",
      storageBucket: "phocuz.firebasestorage.app",
      messagingSenderId: "241068135242",
      appId: "1:241068135242:web:93341c5ee0bcbcb5a3e7b3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Si ya está logueado, redirigir al dashboard
    auth.onAuthStateChanged(async user => {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnLogin");
      const errorMsg = document.getElementById("errorMsg");
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      btn.disabled = true;
      btn.textContent = "Verificando...";
      errorMsg.style.display = "none";

      try {
        await setPersistence(auth, browserSessionPersistence);
        const cred = await signInWithEmailAndPassword(auth, email, password);

        // Verificar rol en Firestore
        const userDoc = await getDoc(doc(db, "admins", cred.user.uid));
        if (!userDoc.exists()) {
          await auth.signOut();
          throw new Error("Sin acceso de administrador.");
        }

        window.location.href = "dashboard.html";
      } catch (err) {
        let msg = "Correo o contraseña incorrectos.";
        if (err.message === "Sin acceso de administrador.") msg = err.message;
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    });
  </script>

</body>
</html>
